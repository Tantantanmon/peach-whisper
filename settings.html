<div class="pw_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🍑 Peach Whisper</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <div>
                <label for="pw_source">API 소스</label>
                <small class="notes">채팅 분석 어시스턴트에 사용할 API를 선택하세요</small>
            </div>
            <select id="pw_source" class="text_pole pw_source_select">
                <option value="main">Main API (현재 채팅 API)</option>
                <option value="profile">Connection Profile (별도 프로필)</option>
            </select>
            <div id="pw_profile_settings" style="display: none; margin-top: 8px;">
                <label for="pw_connection_profile">Connection Profile</label>
                <select id="pw_connection_profile" class="text_pole pw_connection_profile"></select>
            </div>

            <hr class="m-t-1 m-b-1">

            <div>
                <label for="pw_context_messages">최근 메시지 수 (기본값)</label>
                <small class="notes">채팅방별 설정이 없을 때 사용</small>
            </div>
            <input id="pw_context_messages" type="number" class="text_pole" min="1" max="100" value="10" style="width:80px;" />

            <hr class="m-t-1 m-b-1">

            <div>
                <label for="pw_max_tokens">최대 응답 토큰 수 (기본값)</label>
                <small class="notes">응답이 잘릴 경우 높여주세요</small>
            </div>
            <input id="pw_max_tokens" type="number" class="text_pole" min="256" max="8192" step="256" value="1000" style="width:80px;" />

        </div>
    </div>
</div>
